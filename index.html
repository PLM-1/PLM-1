<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Nevo Stick | Official</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
</head>
<body>

    <nav class="nav-glass p-4 flex justify-between items-center sticky top-0 z-50">
        <h1 id="site-logo" class="text-xl font-bold text-blue-500 tracking-tighter uppercase">NEVO STICK</h1>
        <div class="flex items-center gap-4">
            <div id="google_translate_element"></div>
            <button id="login-btn" class="bg-blue-600 px-4 py-2 rounded-lg text-sm font-bold">Google Login</button>
            <div id="user-info" class="hidden flex items-center gap-3">
                <span class="admin-only bg-red-600 text-[10px] px-2 py-0.5 rounded-full font-bold">OWNER</span>
                <img id="user-pic" class="w-8 h-8 rounded-full border border-blue-500">
                <button id="logout-btn" class="text-xs text-gray-400 hover:text-white"><i class="fas fa-power-off"></i></button>
            </div>
        </div>
    </nav>

    <section id="admin-panel" class="admin-only max-w-6xl mx-auto mt-8 p-6 glass rounded-2xl border-l-4 border-red-600 fade-in">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-red-500">Admin Command Center</h2>
            <button onclick="triggerDeath()" class="bg-black text-red-600 border border-red-900 px-4 py-1 rounded text-xs hover:bg-red-600 transition">EXECUTE DEATH</button>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="space-y-3 p-4 bg-white/5 rounded-xl border border-white/10">
                <p class="text-xs font-bold text-yellow-500 uppercase">Branding</p>
                <input type="text" id="new-site-name" placeholder="Rename Website" class="admin-input">
                <button onclick="changeSiteName()" class="w-full bg-yellow-600 py-2 rounded font-bold text-xs">UPDATE NAME</button>
            </div>
            <div class="space-y-3 p-4 bg-white/5 rounded-xl border border-white/10">
                <p class="text-xs font-bold text-blue-400 uppercase">Inventory</p>
                <input type="text" id="prod-name" placeholder="Product Name" class="admin-input">
                <input type="text" id="prod-category" placeholder="Category" class="admin-input">
                <input type="number" id="prod-price" placeholder="Price" class="admin-input">
                <input type="file" id="prod-img" accept="image/*" class="text-[10px] text-gray-500">
                <button onclick="uploadProduct()" id="upload-btn" class="w-full bg-blue-600 py-2 rounded font-bold text-xs">ADD PRODUCT</button>
            </div>
            <div class="space-y-3 p-4 bg-white/5 rounded-xl border border-white/10">
                <p class="text-xs font-bold text-purple-400 uppercase">Sections</p>
                <input type="text" id="section-name" placeholder="Section Title" class="admin-input">
                <button onclick="addNewSection()" class="w-full bg-purple-600 py-2 rounded font-bold text-xs">CREATE SECTION</button>
            </div>
        </div>

        <div class="mt-10 p-4 bg-white/5 rounded-xl border border-white/10">
            <p class="text-xs font-bold text-green-400 uppercase mb-4">Agriculture Section (Request Log)</p>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs">
                    <thead>
                        <tr class="border-b border-white/10 text-gray-400">
                            <th class="p-2">Gmail</th>
                            <th class="p-2">Product/ID</th>
                            <th class="p-2">Section</th>
                            <th class="p-2">Price</th>
                            <th class="p-2">Telegram Contact</th>
                            <th class="p-2">Status</th>
                            <th class="p-2">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="order-log-table"></tbody>
                </table>
            </div>
        </div>
    </section>

    <main id="main-content" class="max-w-6xl mx-auto mt-10 px-4 pb-20">
        <div class="section-container">
            <h3 class="text-3xl font-bold mb-6 opacity-80">Marketplace</h3>
            <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </div>
    </main>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'en'}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
