<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>موقع المنتجات والطلبات متعدد اللغات</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
</head>
<body>
<header>
  <h1 id="title">موقع المنتجات والطلبات</h1>
  <div id="language-select">
    <label for="lang">اللغة:</label>
    <select id="lang" onchange="changeLanguage()">
      <option value="ar">العربية</option>
      <option value="en">English</option>
      <option value="fr">Français</option>
      <option value="es">Español</option>
      <option value="de">Deutsch</option>
    </select>
  </div>
  <div id="login-section">
    <input type="email" id="email" placeholder="ادخل بريدك الإلكتروني">
    <button onclick="login()">تسجيل الدخول</button>
  </div>
</header>

<main>
  <!-- قسم الزبون -->
  <div id="customer-section">
    <h2 id="customer-title">أرسل طلبك</h2>
    <div id="products-display"></div>
    <form id="order-form">
      <input type="text" id="name" placeholder="الاسم الكامل" required>
      <input type="email" id="user-email" placeholder="البريد الإلكتروني" required>
      <input type="text" id="phone" placeholder="رقم الهاتف" required>
      <input type="text" id="address" placeholder="العنوان بالتفصيل" required>
      <div>
        <label id="captcha-label">هل أنت لست روبوت؟</label>
        <input type="checkbox" id="captcha" required> نعم
      </div>
      <button type="submit" id="order-btn">إرسال الطلب</button>
    </form>
    <p id="status"></p>
  </div>

  <!-- قسم المدير -->
  <div id="admin-section" class="hidden">
    <h2 id="admin-title">لوحة المدير</h2>
    
    <div id="sections-admin">
      <h3 id="sections-title">الأقسام</h3>
      <input type="text" id="new-section" placeholder="اسم القسم الجديد">
      <button onclick="addSection()" id="add-section-btn">إضافة قسم</button>
      <div id="sections-list"></div>
    </div>

    <div id="products-admin">
      <h3 id="products-title">المنتجات</h3>
      <input type="text" id="product-name" placeholder="اسم المنتج">
      <input type="text" id="product-desc" placeholder="وصف المنتج">
      <input type="text" id="product-img" placeholder="رابط صورة المنتج">
      <select id="product-section">
        <option value="">اختر القسم</option>
      </select>
      <button onclick="addProduct()" id="add-product-btn">إضافة منتج</button>
      <div id="products-list"></div>
    </div>

    <div id="orders-admin">
      <h3 id="orders-title">طلبات العملاء</h3>
      <div id="orders-list"></div>
    </div>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
